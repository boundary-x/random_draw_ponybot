<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 카드 로봇 리믹스 챌린지 | Boundary X</title>
    <link rel="icon" href="https://raw.githubusercontent.com/boundary-x/ai_teachable_machine/refs/heads/main/Favicon.png"/>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');
        
        :root {
            --font-main: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }
        body, #root, button, input, textarea, select { 
            font-family: var(--font-main) !important; 
        }
        
        .card-perspective { perspective: 1000px; }
        .card-inner {
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-flipped { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        .bx-pill-btn {
            transition: all 0.2s;
            border-radius: 50px; 
            font-weight: 600;
        }
        .bx-btn-black {
            background-color: #000;
            color: #fff;
        }
        .bx-btn-black:hover {
            background-color: #333;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="bg-[#F8F9FA] text-[#111] overflow-x-hidden min-h-screen flex flex-col">
    <div id="root" class="flex flex-col min-h-screen justify-between"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const INTEL_CARDS = [
            { name: '음성 인식 (음성 지능)', emoji: '🗣️', desc: '사람의 음성을 인식하고 명령어를 전달해요.' },
            { name: '포즈 인식 (시각 지능)', emoji: '🧘', desc: '사람의 포즈 데이터를 학습하고 분류해요.' },
        ];

        const FUNC_CARDS = [
            { name: '포니봇 모터', emoji: '🤖', desc: '모바일 이동형 로봇으로 자유롭게 이동할 수 있어요.' },
            { name: '서보 모터', emoji: '🦾', desc: '관절형 로봇으로 물체를 집거나 옮길 수 있어요.' },
        ];

        const SIT_CARDS = [
            { name: '화재 현장', emoji: '🔥', desc: '뜨거운 열기와 짙은 연기로 인해 시야 확보가 매우 어려운 붕괴 위험 구역' },
            { name: '지진 현장', emoji: '🏚️', desc: '바닥이 불안정하고 사방에 잔해물이 흩어져 있어 이동이 제한된 구역' },
            { name: '전쟁터', emoji: '🛡️', desc: '언제 어디서 위험 요소가 발생할지 예측하기 힘든 긴장된 야외 환경' },
            { name: '횡단보도', emoji: '🚦', desc: '차량과 보행자의 동선이 겹치며, 날씨에 따라 변수가 많아지는 도로 위' },
            { name: '학교 교실', emoji: '🏫', desc: '여러 명의 학생과 책걸상이 모여 있어 소음과 장애물이 혼재된 실내 공간' },
            { name: '병원 응급실', emoji: '🏥', desc: '촌각을 다투는 상황이 빈번하며, 의료진과 장비가 쉴 새 없이 움직이는 곳' },
            { name: '우주 정거장', emoji: '🚀', desc: '중력이 거의 없고, 아주 작은 충격이나 오류도 치명적인 결과를 낳는 극한 환경' },
            { name: '도서관', emoji: '📖', desc: '아주 작은 소음도 방해가 되며 수많은 자료가 빽빽하게 밀집된 정숙한 공간' },
            { name: '지하철 역사', emoji: '🚇', desc: '특정 시간대에 엄청난 인파가 몰리며 다양한 출구와 환승 통로가 얽혀 있는 곳' },
            { name: '깊은 바다속', emoji: '🌊', desc: '빛이 거의 닿지 않고 엄청난 수압이 작용하며 조류의 변화가 심한 수중 환경' },
            { name: '대형 물류 창고', emoji: '📦', desc: '수만 개의 물품이 높은 선반에 쌓여 있고 지게차와 작업자가 교차하는 넓은 실내' },
            { name: '스마트 팜 (농장)', emoji: '🍎', desc: '온습도가 통제되어 있지만, 흙과 식물 넝쿨 등 불규칙한 자연물이 가득한 온실' },
            { name: '독거 어르신 가정', emoji: '👵', desc: '거주자의 움직임이 적고 외부와의 교류가 단절되기 쉬운 조용하고 폐쇄적인 거주지' },
            { name: '공항 터미널', emoji: '✈️', desc: '처음 방문하는 사람들이 많고, 넓은 면적에 복잡한 탑승구와 시설이 분포한 곳' },
            { name: '건설 현장', emoji: '🏗️', desc: '무거운 자재가 오가고 소음이 심하며 지형의 높낮이 변화가 매우 큰 야외 작업장' },
            { name: '유치원 놀이터', emoji: '🎠', desc: '어린아이들의 예측 불가능한 움직임이 많고 다양한 놀이기구가 배치된 야외 공간' },
            { name: '태양광 발전소', emoji: '☀️', desc: '광활한 평지나 산비탈에 수많은 패널이 일정하게 늘어서 있지만 관리 인력은 적은 곳' },
            { name: '심산유곡 (산악지대)', emoji: '⛰️', desc: '경사가 가파르고 통신 신호가 약하며 기상 변화를 예측하기 힘든 자연 지형' },
            { name: '레스토랑 주방', emoji: '🍳', desc: '물과 불을 동시에 사용하며, 바닥이 미끄럽고 동선이 매우 좁고 복잡한 실내' },
            { name: '고대 유적지', emoji: '🏺', desc: '아주 작은 충격에도 훼손될 수 있는 약한 구조물과 좁은 통로로 이루어진 미지의 공간' },
        ];

        const App = () => {
            const [step, setStep] = useState(0); 
            
            const [intelCard, setIntelCard] = useState(null);
            const [funcCard, setFuncCard] = useState(null);
            const [sitCard, setSitCard] = useState(null);
            
            const [isIntelFlipped, setIsIntelFlipped] = useState(false);
            const [isFuncFlipped, setIsFuncFlipped] = useState(false);
            const [isSitFlipped, setIsSitFlipped] = useState(false);
            
            // 2단계 폼 상태 관리
            const [decompPeople, setDecompPeople] = useState('');
            const [decompObject, setDecompObject] = useState('');
            const [decompEnv, setDecompEnv] = useState('');
            const [painPoint, setPainPoint] = useState('');
            
            const contentRef = useRef(null);

            const pickRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];

            const drawIntel = () => {
                setIsIntelFlipped(false);
                setTimeout(() => { setIntelCard(pickRandom(INTEL_CARDS)); setIsIntelFlipped(true); }, 150);
            };

            const drawFunc = () => {
                setIsFuncFlipped(false);
                setTimeout(() => { setFuncCard(pickRandom(FUNC_CARDS)); setIsFuncFlipped(true); }, 150);
            };

            const drawSit = () => {
                setIsSitFlipped(false);
                setTimeout(() => { setSitCard(pickRandom(SIT_CARDS)); setIsSitFlipped(true); }, 150);
            };

            const drawAll = () => {
                setIsIntelFlipped(false); setIsFuncFlipped(false); setIsSitFlipped(false);
                setTimeout(() => { setIntelCard(pickRandom(INTEL_CARDS)); setIsIntelFlipped(true); }, 100);
                setTimeout(() => { setFuncCard(pickRandom(FUNC_CARDS)); setIsFuncFlipped(true); }, 300);
                setTimeout(() => { setSitCard(pickRandom(SIT_CARDS)); setIsSitFlipped(true); }, 500);
            };

            const nextStep = () => {
                setStep(prev => prev + 1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const resetChallenge = () => {
                setStep(1);
                setIntelCard(null); setFuncCard(null); setSitCard(null);
                setIsIntelFlipped(false); setIsFuncFlipped(false); setIsSitFlipped(false);
                setDecompPeople(''); setDecompObject(''); setDecompEnv(''); setPainPoint('');
            };

            const isStep1Complete = isIntelFlipped && isFuncFlipped && isSitFlipped;
            const isStep2Complete = painPoint.trim().length > 0;

            return (
                <div className="flex flex-col min-h-screen bg-[#F8F9FA]">
                    {/* HEADER */}
                    <header className="flex justify-between items-center bg-black border-b border-[#333] px-6 py-3.5 shrink-0 z-50 shadow-md">
                        <div className="flex items-center gap-3">
                            <a href="https://boundaryx.io" target="_blank" rel="noreferrer" className="flex items-center transition-opacity hover:opacity-80">
                                <img src="https://raw.githubusercontent.com/boundary-x/ai_voice_recognition/refs/heads/main/boundaryx_logo.png" alt="Boundary X Logo" className="h-6 w-auto" />
                            </a>
                            <div className="h-4 w-px bg-[#444] mx-1"></div>
                            <span className="text-white text-md font-bold tracking-tight">랜덤 카드 로봇 리믹스 챌린지</span>
                        </div>
                    </header>

                    {/* MAIN CONTENTS */}
                    <main className="flex-1 max-w-5xl w-full mx-auto p-6 md:p-10 flex flex-col items-center justify-center">
                        
                        {/* ================= STEP 0: LANDING ================= */}
                        {step === 0 && (
                            <div className="max-w-3xl w-full text-center animate-fade-in">
                                <div className="mb-12">
                                    <h1 className="text-4xl md:text-5xl font-black tracking-tighter mb-4 leading-tight">
                                        랜덤 카드 <br/> <span className="text-black bg-yellow-300 px-3">로봇 리믹스 챌린지</span>
                                    </h1>
                                    <div className="flex flex-col gap-2 mt-6 mb-8">
                                        <div className="flex items-center justify-center gap-2 text-sm font-bold bg-white border border-gray-200 w-fit mx-auto px-4 py-1.5 rounded-full shadow-sm">
                                            <i className="fa-solid fa-list-check text-black"></i>
                                            <span>로봇 리믹스 챌린지 미션 활동 3단계 프로세스</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12 text-left">
                                    <div className="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow">
                                        <div className="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center font-bold mb-5 shadow-lg">1</div>
                                        <h3 className="font-black text-lg mb-2">카드 뽑기</h3>
                                        <p className="text-xs text-gray-500 leading-relaxed">지능(입력), 기능(출력), 상황(환경) 3가지 요소를 랜덤으로 조합합니다.</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow">
                                        <div className="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center font-bold mb-5 shadow-lg">2</div>
                                        <h3 className="font-black text-lg mb-2">프로젝트 설계</h3>
                                        <p className="text-xs text-gray-500 leading-relaxed">상황을 분해하고 핵심 문제를 추상화하여 우리 팀만의 설계 규칙을 정의합니다.</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow">
                                        <div className="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center font-bold mb-5 shadow-lg">3</div>
                                        <h3 className="font-black text-lg mb-2">로봇 완성</h3>
                                        <p className="text-xs text-gray-500 leading-relaxed">설계를 구체화하고 바이브코딩 스튜디오를 활용해 프로젝트를 실현합니다.</p>
                                    </div>
                                </div>

                                <button onClick={nextStep} className="px-16 py-4 bx-pill-btn bx-btn-black text-lg shadow-2xl flex items-center gap-3 mx-auto">
                                    프로젝트 시작하기 <i className="fa-solid fa-chevron-right text-sm"></i>
                                </button>
                            </div>
                        )}

                        {/* ================= STEP 1, 2, 3 ================= */}
                        {step > 0 && (
                            <div className="w-full flex flex-col items-center">
                                {/* Stepper */}
                                <div className="w-full max-w-2xl mb-12">
                                    <div className="flex items-center justify-between relative">
                                        <div className="absolute left-0 top-5 w-full h-0.5 bg-gray-200 -z-10"></div>
                                        <div className="absolute left-0 top-5 h-0.5 bg-black -z-10 transition-all duration-500" style={{ width: step === 1 ? '0%' : step === 2 ? '50%' : '100%' }}></div>
                                        
                                        {[1, 2, 3].map((s) => (
                                            <div key={s} className="flex flex-col items-center gap-2">
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm border-2 transition-all ${step >= s ? 'bg-black border-black text-white shadow-lg' : 'bg-white border-gray-200 text-gray-400'}`}>
                                                    {s}
                                                </div>
                                                <span className={`text-[11px] font-bold ${step >= s ? 'text-black' : 'text-gray-400'}`}>
                                                    {s === 1 ? '카드 뽑기' : s === 2 ? '프로젝트 설계' : '프로젝트 완성'}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Step 1: 카드 뽑기 */}
                                {step === 1 && (
                                    <div className="w-full animate-fade-in flex flex-col items-center">
                                        <div className="bg-white border border-gray-200 rounded-2xl p-6 mb-10 shadow-sm w-full">
                                            <h2 className="font-black text-lg mb-2 flex items-center gap-2">
                                                <i className="fa-solid fa-layer-group"></i> 1단계. 카드 뽑기
                                            </h2>
                                            <p className="text-sm text-gray-500">
                                                하단의 덱을 활용해 프로젝트의 기반이 될 <b>지능, 기능 카드</b>와 환경을 제시하는 <b>상황 카드</b>를 랜덤 매칭합니다.
                                            </p>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                                            <div className="flex flex-col items-center gap-4">
                                                <span className="text-[11px] font-black bg-black text-white px-4 py-1.5 rounded-full shadow-md">🧠 지능 (입력)</span>
                                                <div className="card-perspective w-[210px] h-[280px] cursor-pointer" onClick={drawIntel}>
                                                    <div className={`card-inner w-full h-full relative rounded-2xl shadow-lg border border-gray-200 ${isIntelFlipped ? 'card-flipped' : ''}`}>
                                                        <div className="backface-hidden absolute inset-0 bg-black rounded-2xl flex flex-col items-center justify-center p-4 text-center text-white">
                                                            <i className="fa-solid fa-microchip text-4xl mb-4 opacity-40"></i>
                                                            <div className="text-[10px] font-mono tracking-widest opacity-60">INTELLIGENCE</div>
                                                        </div>
                                                        <div className="backface-hidden absolute inset-0 bg-white rounded-2xl flex flex-col items-center justify-between p-6 text-center rotate-y-180">
                                                            <div className="text-5xl my-auto">{intelCard?.emoji}</div>
                                                            <div>
                                                                <div className="text-sm font-black mb-1">{intelCard?.name}</div>
                                                                <div className="text-[11px] text-gray-500 leading-tight">{intelCard?.desc}</div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="flex flex-col items-center gap-4">
                                                <span className="text-[11px] font-black bg-black text-white px-4 py-1.5 rounded-full shadow-md">⚙️ 기능 (출력)</span>
                                                <div className="card-perspective w-[210px] h-[280px] cursor-pointer" onClick={drawFunc}>
                                                    <div className={`card-inner w-full h-full relative rounded-2xl shadow-lg border border-gray-200 ${isFuncFlipped ? 'card-flipped' : ''}`}>
                                                        <div className="backface-hidden absolute inset-0 bg-black rounded-2xl flex flex-col items-center justify-center p-4 text-center text-white">
                                                            <i className="fa-solid fa-robot text-4xl mb-4 opacity-40"></i>
                                                            <div className="text-[10px] font-mono tracking-widest opacity-60">FUNCTION</div>
                                                        </div>
                                                        <div className="backface-hidden absolute inset-0 bg-white rounded-2xl flex flex-col items-center justify-between p-6 text-center rotate-y-180">
                                                            <div className="text-5xl my-auto">{funcCard?.emoji}</div>
                                                            <div>
                                                                <div className="text-sm font-black mb-1">{funcCard?.name}</div>
                                                                <div className="text-[11px] text-gray-500 leading-tight">{funcCard?.desc}</div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="flex flex-col items-center gap-4">
                                                <span className="text-[11px] font-black bg-black text-white px-4 py-1.5 rounded-full shadow-md">🌍 상황 (환경)</span>
                                                <div className="card-perspective w-[210px] h-[280px] cursor-pointer" onClick={drawSit}>
                                                    <div className={`card-inner w-full h-full relative rounded-2xl shadow-lg border border-gray-200 ${isSitFlipped ? 'card-flipped' : ''}`}>
                                                        <div className="backface-hidden absolute inset-0 bg-black rounded-2xl flex flex-col items-center justify-center p-4 text-center text-white">
                                                            <i className="fa-solid fa-earth-americas text-4xl mb-4 opacity-40"></i>
                                                            <div className="text-[10px] font-mono tracking-widest opacity-60">SITUATION</div>
                                                        </div>
                                                        <div className="backface-hidden absolute inset-0 bg-white rounded-2xl flex flex-col items-center justify-between p-6 text-center rotate-y-180">
                                                            <div className="text-5xl my-auto">{sitCard?.emoji}</div>
                                                            <div>
                                                                <div className="text-sm font-black mb-1">{sitCard?.name}</div>
                                                                <div className="text-[11px] text-gray-500 leading-tight">{sitCard?.desc}</div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {!isStep1Complete ? (
                                            <button onClick={drawAll} className="px-10 py-3.5 bx-pill-btn bx-btn-black text-sm flex items-center gap-2 shadow-xl">
                                                <i className="fa-solid fa-dice text-lg"></i> 모든 카드 일괄 뽑기
                                            </button>
                                        ) : (
                                            <button onClick={nextStep} className="px-12 py-3.5 bx-pill-btn bx-btn-black text-sm flex items-center gap-2 shadow-xl animate-fade-in">
                                                2단계: 프로젝트 설계 이동 <i className="fa-solid fa-arrow-right"></i>
                                            </button>
                                        )}
                                    </div>
                                )}

                                {/* Step 2: 프로젝트 설계 (인터랙티브 기획) */}
                                {step === 2 && (intelCard && funcCard && sitCard) && (
                                    <div className="w-full animate-fade-in flex flex-col items-center">
                                        
                                        <div className="bg-white border border-gray-200 rounded-2xl p-6 mb-8 shadow-sm w-full">
                                            <h2 className="font-black text-lg mb-2 flex items-center gap-2">
                                                <i className="fa-solid fa-pen-ruler"></i> 2단계. 팀 프로젝트 설계
                                            </h2>
                                            <p className="text-sm text-gray-500 leading-relaxed">
                                                상황을 <b>분해(Decomposition)</b>하여 요소를 파악하고, 핵심 문제를 <b>추상화(Abstraction)</b>하여 우리 팀만의 융합 솔루션을 설계합니다.
                                            </p>
                                        </div>

                                        <div className="w-full flex flex-col gap-8 mb-12">
                                            {/* 2-1: 분해 (Decomposition) */}
                                            <div className="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm">
                                                <div className="flex items-center gap-3 mb-6">
                                                    <span className="bg-black text-white text-xs font-bold px-2.5 py-1 rounded">2-1. 분해</span>
                                                    <h3 className="font-bold text-lg"><span className="text-[#1A73E8]">[{sitCard.name}]</span> 공간 해체하기</h3>
                                                </div>
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                    <div className="flex flex-col gap-2">
                                                        <label className="text-xs font-bold text-gray-600"><i className="fa-solid fa-person text-gray-400 mr-1"></i> 사람 (누가 있을까?)</label>
                                                        <input type="text" value={decompPeople} onChange={(e) => setDecompPeople(e.target.value)} placeholder="예: 구급대원, 다친 사람" className="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-black focus:ring-1 focus:ring-black outline-none text-sm transition-all" />
                                                    </div>
                                                    <div className="flex flex-col gap-2">
                                                        <label className="text-xs font-bold text-gray-600"><i className="fa-solid fa-box text-gray-400 mr-1"></i> 사물 (어떤 물건이?)</label>
                                                        <input type="text" value={decompObject} onChange={(e) => setDecompObject(e.target.value)} placeholder="예: 무너진 돌더미, 유리 파편" className="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-black focus:ring-1 focus:ring-black outline-none text-sm transition-all" />
                                                    </div>
                                                    <div className="flex flex-col gap-2">
                                                        <label className="text-xs font-bold text-gray-600"><i className="fa-solid fa-cloud-sun text-gray-400 mr-1"></i> 환경 (분위기나 날씨는?)</label>
                                                        <input type="text" value={decompEnv} onChange={(e) => setDecompEnv(e.target.value)} placeholder="예: 시야가 어둡고 먼지가 많음" className="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-black focus:ring-1 focus:ring-black outline-none text-sm transition-all" />
                                                    </div>
                                                </div>
                                            </div>

                                            {/* 2-2: 추상화 (Abstraction) */}
                                            <div className="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm relative">
                                                <i className="fa-solid fa-arrow-down absolute -top-6 left-1/2 -translate-x-1/2 text-gray-300 text-2xl bg-[#F8F9FA] rounded-full p-1"></i>
                                                <div className="flex items-center gap-3 mb-6">
                                                    <span className="bg-black text-white text-xs font-bold px-2.5 py-1 rounded">2-2. 추상화</span>
                                                    <h3 className="font-bold text-lg">불편함 (Pain Point) 정의하기</h3>
                                                </div>
                                                <div className="flex flex-col gap-2">
                                                    <label className="text-xs font-bold text-gray-600">위에서 찾은 요소들이 부딪힐 때 발생하는 가장 큰 문제는 무엇인가요?</label>
                                                    <input type="text" value={painPoint} onChange={(e) => setPainPoint(e.target.value)} placeholder="예: 어두운 환경 때문에 구급대원이 다친 사람을 빨리 찾지 못해 위험하다." className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-[#EA4335] focus:ring-1 focus:ring-[#EA4335] outline-none text-sm font-medium transition-all" />
                                                </div>
                                            </div>

                                            {/* 2-3: 핵심 설계 규칙 (Design Rule) */}
                                            <div className="w-full bg-white border-[4px] border-black rounded-[40px] p-8 md:p-12 shadow-xl relative overflow-hidden transition-all">
                                                <div className="absolute top-0 left-0 w-full h-2 bg-yellow-300"></div>
                                                <div className="text-center mb-8">
                                                    <span className="text-[10px] font-black tracking-[0.3em] bg-black text-white px-6 py-1.5 rounded-full uppercase">Robot Design Rule</span>
                                                </div>
                                                <div className="text-lg md:text-2xl font-black leading-[2.4] text-center">
                                                    우리 팀은 <span className="bg-yellow-100 border-b-4 border-yellow-400 px-3 py-1 mx-1">{intelCard.name}</span>을 지능으로 활용하고,<br className="hidden md:block"/>
                                                    <span className="bg-yellow-100 border-b-4 border-yellow-400 px-3 py-1 mx-1">{funcCard.name}</span>을 기능으로 활용하여,<br className="hidden md:block"/>
                                                    <span className="bg-yellow-100 border-b-4 border-yellow-400 px-3 py-1 mx-1">{sitCard.name}</span> 상황에서 발생하는<br className="hidden md:block"/>
                                                    <span className={`border-b-4 border-black px-6 py-1 mx-2 transition-all ${painPoint ? 'text-black bg-blue-50 border-blue-500' : 'text-gray-300 font-mono italic'}`}>
                                                        {painPoint || '정의한 핵심 문제'}
                                                    </span> 문제를 해결한다.
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex gap-4">
                                            <button onClick={resetChallenge} className="px-8 py-3.5 bg-white border-2 border-black rounded-full text-sm font-black hover:bg-gray-50 transition-colors">
                                                다시 처음부터
                                            </button>
                                            <button 
                                                onClick={nextStep} 
                                                disabled={!isStep2Complete}
                                                className={`px-12 py-3.5 bx-pill-btn text-sm shadow-xl flex items-center gap-2 transition-all ${isStep2Complete ? 'bx-btn-black' : 'bg-gray-200 text-gray-400 cursor-not-allowed border-none shadow-none'}`}
                                            >
                                                설계 완료! 3단계 이동 <i className="fa-solid fa-check"></i>
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* Step 3: 프로젝트 완성 */}
                                {step === 3 && (
                                    <div className="w-full animate-fade-in flex flex-col items-center">
                                        <div className="bg-white border border-gray-200 rounded-2xl p-6 mb-10 shadow-sm w-full">
                                            <h2 className="font-black text-lg mb-2 flex items-center gap-2">
                                                <i className="fa-solid fa-rocket"></i> 3단계. 로봇 프로젝트 완성
                                            </h2>
                                            <p className="text-sm text-gray-500 leading-relaxed">
                                                팀원들과 정의한 핵심 설계 규칙을 바탕으로 프로젝트를 구체화하고 구현해봅시다. <br/>
                                                복잡한 기능 구현은 <b>바이브코딩 스튜디오</b>를 활용해 완성할 수 있습니다.
                                            </p>
                                        </div>

                                        <div className="bg-black text-white w-full rounded-[40px] p-12 mb-12 text-center shadow-2xl">
                                            <div className="w-20 h-20 bg-white/10 rounded-3xl flex items-center justify-center text-4xl mb-6 mx-auto border border-white/20">
                                                🛰️
                                            </div>
                                            <h3 className="text-2xl font-black mb-4 tracking-tight">도전을 시작할 준비가 되었나요?</h3>
                                            <p className="text-gray-400 text-sm mb-10 leading-relaxed">
                                                설계한 규칙에 맞춰 지능형 모델을 학습시키고<br/>
                                                로봇의 동작을 코딩하여 미션을 해결해보세요.
                                            </p>
                                            <a href="https://boundary-x.github.io/vibe_coding_studio/" target="_blank" rel="noreferrer" className="inline-flex items-center gap-3 px-16 py-4 bg-yellow-300 hover:bg-yellow-400 text-black rounded-full font-black text-lg transition-all shadow-[0_10px_30px_rgba(253,224,71,0.3)]">
                                                <i className="fa-solid fa-laptop-code"></i>
                                                바이브코딩 스튜디오 열기
                                            </a>
                                        </div>

                                        <button onClick={() => setStep(0)} className="text-xs font-black text-gray-400 hover:text-black transition-colors underline underline-offset-8">
                                            챌린지 프로세스 다시 확인하기
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                    </main>

                    {/* FOOTER */}
                    <footer className="bg-black text-white px-8 py-5 border-t border-[#222] shrink-0 text-xs flex flex-col md:flex-row justify-between items-center gap-4 z-50">
                        <div className="flex flex-col gap-1.5 text-center md:text-left">
                            <strong className="text-sm font-bold tracking-tight">바운더리엑스 (Boundary X)</strong>
                            <span className="text-[#999] font-normal">"미래 기술을 교실의 책상 위로"</span>
                        </div>
                        <div className="flex flex-col md:flex-row items-center gap-4 md:gap-8">
                            <div className="flex items-center gap-2 bg-[#1a1a1a] px-3 py-1.5 rounded-full border border-[#333]">
                                <i className="fa-solid fa-circle-exclamation text-[#4285F4]"></i>
                                <span className="text-[#ccc]">사용법: 생성된 코드를 <b>MakeCode JavaScript 탭</b>에 붙여넣으세요.</span>
                            </div>
                            <div className="text-[#666] font-medium">
                                © 2026 Boundary X Co. All rights reserved.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 카드 로봇 리믹스 챌린지 | Boundary X</title>
    <link rel="icon" href="https://raw.githubusercontent.com/boundary-x/ai_teachable_machine/refs/heads/main/Favicon.png"/>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');
        
        :root {
            --font-main: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }
        body, #root, button, input, textarea, select { 
            font-family: var(--font-main) !important; 
        }
        
        .card-perspective { perspective: 1000px; }
        .card-inner {
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-flipped { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        .bx-pill-btn {
            transition: all 0.2s;
            border-radius: 50px; 
            font-weight: 600;
        }
        .bx-btn-black {
            background-color: #000;
            color: #fff;
        }
        .bx-btn-black:hover {
            background-color: #333;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* PDF 출력용 숨겨진 양식 스타일 */
        #pdf-template {
            display: none;
            width: 210mm;
            padding: 20mm;
            background: white;
            color: black;
        }
        .pdf-section {
            border: 1px solid #000;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        .pdf-label {
            font-size: 12px;
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }
        .pdf-value {
            font-size: 16px;
            font-weight: 600;
            min-height: 24px;
        }
    </style>
</head>
<body class="bg-[#F8F9FA] text-[#111] overflow-x-hidden min-h-screen flex flex-col">
    <div id="root" class="flex flex-col min-h-screen justify-between"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const INTEL_CARDS = [
            { name: '음성 인식 (음성 지능)', emoji: '🗣️', desc: '사람의 음성을 인식하고 명령어를 전달해요.' },
            { name: '포즈 인식 (시각 지능)', emoji: '🧘', desc: '사람의 포즈 데이터를 학습하고 분류해요.' },
        ];
        const FUNC_CARDS = [
            { name: '포니봇 모터', emoji: '🤖', desc: '모바일 이동형 로봇으로 자유롭게 이동할 수 있어요.' },
            { name: '서보 모터', emoji: '🦾', desc: '관절형 로봇으로 물체를 집거나 옮길 수 있어요.' },
        ];
        const SIT_CARDS = [
            { name: '화재 현장', emoji: '🔥', desc: '뜨거운 열기와 짙은 연기로 인해 시야 확보가 매우 어려운 붕괴 위험 구역' },
            { name: '지진 현장', emoji: '🏚️', desc: '바닥이 불안정하고 사방에 잔해물이 흩어져 있어 이동이 제한된 구역' },
            { name: '전쟁터', emoji: '🛡️', desc: '언제 어디서 위험 요소가 발생할지 예측하기 힘든 긴장된 야외 환경' },
            { name: '횡단보도', emoji: '🚦', desc: '차량과 보행자의 동선이 겹치며, 날씨에 따라 변수가 많아지는 도로 위' },
            { name: '학교 교실', emoji: '🏫', desc: '여러 명의 학생과 책걸상이 모여 있어 소음과 장애물이 혼재된 실내 공간' },
            { name: '병원 응급실', emoji: '🏥', desc: '촌각을 다투는 상황이 빈번하며, 의료진과 장비가 쉴 새 없이 움직이는 곳' },
            { name: '우주 정거장', emoji: '🚀', desc: '중력이 거의 없고, 아주 작은 충격이나 오류도 치명적인 결과를 낳는 극한 환경' },
            { name: '도서관', emoji: '📖', desc: '아주 작은 소음도 방해가 되며 수많은 자료가 빽빽하게 밀집된 정숙한 공간' },
            { name: '지하철 역사', emoji: '🚇', desc: '특정 시간대에 엄청난 인파가 몰리며 다양한 출구와 환승 통로가 얽혀 있는 곳' },
            { name: '깊은 바다속', emoji: '🌊', desc: '빛이 거의 닿지 않고 엄청난 수압이 작용하며 조류의 변화가 심한 수중 환경' },
            { name: '대형 물류 창고', emoji: '📦', desc: '수만 개의 물품이 높은 선반에 쌓여 있고 지게차와 작업자가 교차하는 넓은 실내' },
            { name: '스마트 팜 (농장)', emoji: '🍎', desc: '온습도가 통제되어 있지만, 흙과 식물 넝쿨 등 불규칙한 자연물이 가득한 온실' },
            { name: '독거 어르신 가정', emoji: '👵', desc: '거주자의 움직임이 적고 외부와의 교류가 단절되기 쉬운 조용하고 폐쇄적인 거주지' },
            { name: '공항 터미널', emoji: '✈️', desc: '처음 방문하는 사람들이 많고, 넓은 면적에 복잡한 탑승구와 시설이 분포한 곳' },
            { name: '건설 현장', emoji: '🏗️', desc: '무거운 자재가 오가고 소음이 심하며 지형의 높낮이 변화가 매우 큰 야외 작업장' },
            { name: '유치원 놀이터', emoji: '🎠', desc: '어린아이들의 예측 불가능한 움직임이 많고 다양한 놀이기구가 배치된 야외 공간' },
            { name: '태양광 발전소', emoji: '☀️', desc: '광활한 평지나 산비탈에 수많은 패널이 일정하게 늘어서 있지만 관리 인력은 적은 곳' },
            { name: '심산유곡 (산악지대)', emoji: '⛰️', desc: '경사가 가파르고 통신 신호가 약하며 기상 변화를 예측하기 힘든 자연 지형' },
            { name: '레스토랑 주방', emoji: '🍳', desc: '물과 불을 동시에 사용하며, 바닥이 미끄럽고 동선이 매우 좁고 복잡한 실내' },
            { name: '고대 유적지', emoji: '🏺', desc: '아주 작은 충격에도 훼손될 수 있는 약한 구조물과 좁은 통로로 이루어진 미지의 공간' },
        ];

        const App = () => {
            const [step, setStep] = useState(0); 
            const [intelCard, setIntelCard] = useState(null);
            const [funcCard, setFuncCard] = useState(null);
            const [sitCard, setSitCard] = useState(null);
            const [isIntelFlipped, setIsIntelFlipped] = useState(false);
            const [isFuncFlipped, setIsFuncFlipped] = useState(false);
            const [isSitFlipped, setIsSitFlipped] = useState(false);
            const [decompPeople, setDecompPeople] = useState('');
            const [decompObject, setDecompObject] = useState('');
            const [decompEnv, setDecompEnv] = useState('');
            const [painPoint, setPainPoint] = useState('');
            
            const [isExporting, setIsExporting] = useState(false);
            const pdfSourceRef = useRef(null);

            const pickRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];
            const drawIntel = () => { setIsIntelFlipped(false); setTimeout(() => { setIntelCard(pickRandom(INTEL_CARDS)); setIsIntelFlipped(true); }, 150); };
            const drawFunc = () => { setIsFuncFlipped(false); setTimeout(() => { setFuncCard(pickRandom(FUNC_CARDS)); setIsFuncFlipped(true); }, 150); };
            const drawSit = () => { setIsSitFlipped(false); setTimeout(() => { setSitCard(pickRandom(SIT_CARDS)); setIsSitFlipped(true); }, 150); };
            const drawAll = () => { setIsIntelFlipped(false); setIsFuncFlipped(false); setIsSitFlipped(false); setTimeout(() => { setIntelCard(pickRandom(INTEL_CARDS)); setIsIntelFlipped(true); }, 100); setTimeout(() => { setFuncCard(pickRandom(FUNC_CARDS)); setIsFuncFlipped(true); }, 300); setTimeout(() => { setSitCard(pickRandom(SIT_CARDS)); setIsSitFlipped(true); }, 500); };

            const nextStep = () => { setStep(prev => prev + 1); window.scrollTo({ top: 0, behavior: 'smooth' }); };
            const resetChallenge = () => { setStep(1); setIntelCard(null); setFuncCard(null); setSitCard(null); setIsIntelFlipped(false); setIsFuncFlipped(false); setIsSitFlipped(false); setDecompPeople(''); setDecompObject(''); setDecompEnv(''); setPainPoint(''); };

            // PDF 생성 로직 (별도 템플릿 사용)
            const handleDownloadPDF = () => {
                setIsExporting(true);
                const element = pdfSourceRef.current;
                element.style.display = 'block';

                const opt = {
                    margin: 10,
                    filename: `로봇리믹스_챌린지_기획서.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                window.html2pdf().set(opt).from(element).save().then(() => {
                    element.style.display = 'none';
                    setIsExporting(false);
                });
            };

            const isStep1Complete = isIntelFlipped && isFuncFlipped && isSitFlipped;
            const isStep2Complete = painPoint.trim().length > 0;

            return (
                <div className="flex flex-col min-h-screen bg-[#F8F9FA]">
                    <header className="flex justify-between items-center bg-black border-b border-[#333] px-6 py-3.5 shrink-0 z-50 shadow-md">
                        <div className="flex items-center gap-3">
                            <a href="https://boundaryx.io" target="_blank" rel="noreferrer" className="flex items-center transition-opacity hover:opacity-80">
                                <img src="https://raw.githubusercontent.com/boundary-x/ai_voice_recognition/refs/heads/main/boundaryx_logo.png" alt="Boundary X Logo" className="h-6 w-auto" />
                            </a>
                            <div className="h-4 w-px bg-[#444] mx-1"></div>
                            <span className="text-white text-md font-bold tracking-tight">랜덤 카드 로봇 리믹스 챌린지</span>
                        </div>
                    </header>

                    <main className="flex-1 max-w-5xl w-full mx-auto p-6 md:p-10 flex flex-col items-center justify-center">
                        
                        {/* ================= STEP 0: LANDING ================= */}
                        {step === 0 && (
                            <div className="max-w-3xl w-full text-center animate-fade-in">
                                <div className="mb-12">
                                    <h1 className="text-4xl md:text-5xl font-black tracking-tighter mb-4 leading-tight">
                                        랜덤 카드 <br/> <span className="text-black bg-yellow-300 px-3">로봇 리믹스 챌린지</span>
                                    </h1>
                                    <div className="flex items-center justify-center gap-2 text-sm font-bold bg-white border border-gray-200 w-fit mx-auto px-4 py-1.5 rounded-full shadow-sm">
                                        <i className="fa-solid fa-list-check text-black"></i>
                                        <span>로봇 리믹스 챌린지 미션 활동 3단계 프로세스</span>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12 text-left">
                                    <div className="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm"><div className="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center font-bold mb-5 shadow-lg">1</div><h3 className="font-black text-lg mb-2">카드 뽑기</h3><p className="text-xs text-gray-500 leading-relaxed">지능(입력), 기능(출력), 상황(환경) 3가지 요소를 랜덤으로 조합합니다.</p></div>
                                    <div className="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm"><div className="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center font-bold mb-5 shadow-lg">2</div><h3 className="font-black text-lg mb-2">프로젝트 설계</h3><p className="text-xs text-gray-500 leading-relaxed">상황을 분해하고 핵심 문제를 추상화하여 우리 팀만의 설계 규칙을 정의합니다.</p></div>
                                    <div className="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm"><div className="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center font-bold mb-5 shadow-lg">3</div><h3 className="font-black text-lg mb-2">로봇 완성</h3><p className="text-xs text-gray-500 leading-relaxed">설계를 구체화하고 바이브코딩 스튜디오를 활용해 프로젝트를 실현합니다.</p></div>
                                </div>
                                <button onClick={nextStep} className="px-16 py-4 bx-pill-btn bx-btn-black text-lg shadow-2xl flex items-center gap-3 mx-auto">프로젝트 시작하기 <i className="fa-solid fa-chevron-right text-sm"></i></button>
                            </div>
                        )}

                        {/* ================= MAIN CHALLENGE ================= */}
                        {step > 0 && (
                            <div className="w-full flex flex-col items-center">
                                <div className="w-full max-w-2xl mb-12">
                                    <div className="flex items-center justify-between relative">
                                        <div className="absolute left-0 top-5 w-full h-0.5 bg-gray-200 -z-10"></div>
                                        <div className="absolute left-0 top-5 h-0.5 bg-black -z-10 transition-all duration-500" style={{ width: step === 1 ? '0%' : step === 2 ? '50%' : '100%' }}></div>
                                        {[1, 2, 3].map((s) => (
                                            <div key={s} className="flex flex-col items-center gap-2">
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm border-2 transition-all ${step >= s ? 'bg-black border-black text-white shadow-lg' : 'bg-white border-gray-200 text-gray-400'}`}>{s}</div>
                                                <span className={`text-[11px] font-bold ${step >= s ? 'text-black' : 'text-gray-400'}`}>{s === 1 ? '카드 뽑기' : s === 2 ? '프로젝트 설계' : '프로젝트 완성'}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* STEP 1: 카드 뽑기 */}
                                {step === 1 && (
                                    <div className="w-full animate-fade-in flex flex-col items-center">
                                        <div className="bg-white border-2 border-black rounded-3xl p-8 mb-10 shadow-sm w-full relative overflow-hidden text-center">
                                            <h2 className="font-black text-xl mb-6 flex items-center justify-center gap-2"><i className="fa-solid fa-dice text-black"></i> 1단계. 로봇 리믹스 카드 뽑기</h2>
                                            <div className="flex flex-col md:flex-row items-center justify-between gap-6 bg-[#F8F9FA] rounded-2xl p-6 border border-gray-200">
                                                <div className="flex flex-col items-center flex-1">
                                                    <div className="w-12 h-12 bg-black text-white rounded-xl flex items-center justify-center text-xl mb-3"><i className="fa-solid fa-brain"></i></div>
                                                    <span className="text-xs font-black mb-1">지능 (입력)</span>
                                                    <span className="text-[14px] font-bold text-[#1A73E8]">● 입력 (Input)</span>
                                                </div>
                                                <i className="fa-solid fa-plus text-gray-300 hidden md:block"></i>
                                                <div className="flex flex-col items-center flex-1">
                                                    <div className="w-12 h-12 bg-black text-white rounded-xl flex items-center justify-center text-xl mb-3"><i className="fa-solid fa-robot"></i></div>
                                                    <span className="text-xs font-black mb-1">기능 (출력)</span>
                                                    <span className="text-[14px] font-bold text-[#EA4335]">● 출력 (Output)</span>
                                                </div>
                                                <i className="fa-solid fa-at text-gray-300 hidden md:block"></i>
                                                <div className="flex flex-col items-center flex-1">
                                                    <div className="w-12 h-12 bg-black text-white rounded-xl flex items-center justify-center text-xl mb-3"><i className="fa-solid fa-earth-americas"></i></div>
                                                    <span className="text-xs font-black mb-1">상황 (환경)</span>
                                                    <span className="text-[14px] font-bold text-[#34A853]">● 아이디어 (Idea)</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                                            <div className="flex flex-col items-center gap-4">
                                                <span className="text-[11px] font-black bg-black text-white px-4 py-1.5 rounded-full">🧠 지능 (입력)</span>
                                                <div className="card-perspective w-[210px] h-[280px] cursor-pointer" onClick={drawIntel}>
                                                    <div className={`card-inner w-full h-full relative rounded-2xl shadow-lg border border-gray-200 ${isIntelFlipped ? 'card-flipped' : ''}`}>
                                                        <div className="backface-hidden absolute inset-0 bg-black rounded-2xl flex flex-col items-center justify-center p-4 text-white"><i className="fa-solid fa-microchip text-4xl mb-4 opacity-40"></i><div className="text-[10px] font-mono tracking-widest opacity-60">INTELLIGENCE</div></div>
                                                        <div className="backface-hidden absolute inset-0 bg-white rounded-2xl flex flex-col items-center justify-between p-6 text-center rotate-y-180"><div className="text-5xl my-auto">{intelCard?.emoji}</div><div><div className="text-sm font-black mb-1">{intelCard?.name}</div><div className="text-[11px] text-gray-500">{intelCard?.desc}</div></div></div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-center gap-4">
                                                <span className="text-[11px] font-black bg-black text-white px-4 py-1.5 rounded-full">⚙️ 기능 (출력)</span>
                                                <div className="card-perspective w-[210px] h-[280px] cursor-pointer" onClick={drawFunc}>
                                                    <div className={`card-inner w-full h-full relative rounded-2xl shadow-lg border border-gray-200 ${isFuncFlipped ? 'card-flipped' : ''}`}>
                                                        <div className="backface-hidden absolute inset-0 bg-black rounded-2xl flex flex-col items-center justify-center p-4 text-white"><i className="fa-solid fa-robot text-4xl mb-4 opacity-40"></i><div className="text-[10px] font-mono tracking-widest opacity-60">FUNCTION</div></div>
                                                        <div className="backface-hidden absolute inset-0 bg-white rounded-2xl flex flex-col items-center justify-between p-6 text-center rotate-y-180"><div className="text-5xl my-auto">{funcCard?.emoji}</div><div><div className="text-sm font-black mb-1">{funcCard?.name}</div><div className="text-[11px] text-gray-500">{funcCard?.desc}</div></div></div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-center gap-4">
                                                <span className="text-[11px] font-black bg-black text-white px-4 py-1.5 rounded-full">🌍 상황 (환경)</span>
                                                <div className="card-perspective w-[210px] h-[280px] cursor-pointer" onClick={drawSit}>
                                                    <div className={`card-inner w-full h-full relative rounded-2xl shadow-lg border border-gray-200 ${isSitFlipped ? 'card-flipped' : ''}`}>
                                                        <div className="backface-hidden absolute inset-0 bg-black rounded-2xl flex flex-col items-center justify-center p-4 text-white"><i className="fa-solid fa-earth-americas text-4xl mb-4 opacity-40"></i><div className="text-[10px] font-mono tracking-widest opacity-60">SITUATION</div></div>
                                                        <div className="backface-hidden absolute inset-0 bg-white rounded-2xl flex flex-col items-center justify-between p-6 text-center rotate-y-180"><div className="text-5xl my-auto">{sitCard?.emoji}</div><div><div className="text-sm font-black mb-1">{sitCard?.name}</div><div className="text-[11px] text-gray-500">{sitCard?.desc}</div></div></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        {!isStep1Complete ? (
                                            <button onClick={drawAll} className="px-10 py-3.5 bx-pill-btn bx-btn-black text-sm flex items-center gap-2 shadow-xl"><i className="fa-solid fa-dice text-lg"></i> 모든 카드 일괄 뽑기</button>
                                        ) : (
                                            <button onClick={nextStep} className="px-12 py-3.5 bx-pill-btn bx-btn-black text-sm flex items-center gap-2 shadow-xl animate-fade-in">2단계: 프로젝트 설계 이동 <i className="fa-solid fa-arrow-right"></i></button>
                                        )}
                                    </div>
                                )}

                                {/* STEP 2: 프로젝트 설계 */}
                                {step === 2 && (intelCard && funcCard && sitCard) && (
                                    <div className="w-full animate-fade-in flex flex-col items-center">
                                        <div className="bg-white border border-gray-200 rounded-2xl p-6 mb-8 shadow-sm w-full">
                                            <h2 className="font-black text-lg mb-2 flex items-center gap-2"><i className="fa-solid fa-pen-ruler"></i> 2단계. 팀 프로젝트 설계</h2>
                                            <p className="text-sm text-gray-500">상황을 <b>분해</b>하여 요소를 파악하고, 핵심 문제를 <b>추상화</b>하여 설계 규칙을 정의합니다.</p>
                                        </div>

                                        <div className="w-full flex flex-col gap-8 mb-12">
                                            {/* 입력 UI 영역 */}
                                            <div className="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm">
                                                <div className="flex items-center gap-3 mb-6"><span className="bg-black text-white text-xs font-bold px-2.5 py-1 rounded">2-1. 분해</span><h3 className="font-bold text-lg">[{sitCard.name}] 공간 해체하기</h3></div>
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                    <div className="flex flex-col gap-2"><label className="text-xs font-bold text-gray-600">사람</label><input type="text" value={decompPeople} onChange={(e) => setDecompPeople(e.target.value)} placeholder="예: 구급대원, 다친 사람" className="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-black outline-none text-sm" /></div>
                                                    <div className="flex flex-col gap-2"><label className="text-xs font-bold text-gray-600">사물</label><input type="text" value={decompObject} onChange={(e) => setDecompObject(e.target.value)} placeholder="예: 무너진 돌더미" className="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-black outline-none text-sm" /></div>
                                                    <div className="flex flex-col gap-2"><label className="text-xs font-bold text-gray-600">환경</label><input type="text" value={decompEnv} onChange={(e) => setDecompEnv(e.target.value)} placeholder="예: 시야가 어둡고 먼지가 많음" className="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-black outline-none text-sm" /></div>
                                                </div>
                                            </div>

                                            <div className="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm">
                                                <div className="flex items-center gap-3 mb-6"><span className="bg-black text-white text-xs font-bold px-2.5 py-1 rounded">2-2. 추상화</span><h3 className="font-bold text-lg">불편함 정의하기</h3></div>
                                                <input type="text" value={painPoint} onChange={(e) => setPainPoint(e.target.value)} placeholder="발생하는 가장 큰 문제는 무엇인가요?" className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-[#EA4335] outline-none text-sm font-medium" />
                                            </div>

                                            {/* 💡 확장 팁 (Tip Box) */}
                                            <div className="w-full bg-[#F6F8FC] border border-[#E8EAED] rounded-2xl p-5 flex gap-4 items-start shadow-sm mt-2">
                                                <div className="bg-white text-2xl p-2 rounded-xl shadow-sm border border-gray-100 flex-shrink-0">💡</div>
                                                <div>
                                                    <h4 className="text-sm font-bold text-[#1A73E8] mb-1">추가 기능을 자유롭게 융합하세요</h4>

                                                </div>
                                            </div>

                                            <div className="w-full bg-white border-[4px] border-black rounded-[40px] p-8 md:p-12 shadow-xl text-center">

                                            </div>
                                        </div>

                                        <div className="flex gap-4 flex-wrap justify-center">
                                            <button onClick={resetChallenge} className="px-8 py-3.5 bg-white border-2 border-black rounded-full text-sm font-bold">다시 처음부터</button>
                                            <button onClick={handleDownloadPDF} disabled={isExporting} className="px-8 py-3.5 bg-white border-2 border-black rounded-full text-sm font-bold flex items-center gap-2 transition-all hover:bg-gray-50 disabled:opacity-50">

                                            </button>
                                            <button onClick={nextStep} disabled={!isStep2Complete} className={`px-12 py-3.5 bx-pill-btn text-sm shadow-xl flex items-center gap-2 ${isStep2Complete ? 'bx-btn-black' : 'bg-gray-200 text-gray-400 cursor-not-allowed border-none shadow-none'}`}>설계 완료! 3단계 이동 <i className="fa-solid fa-check"></i></button>
                                        </div>
                                    </div>
                                )}

                                {/* STEP 3: 프로젝트 완성 */}
                                {step === 3 && (

                                            <h2 className="font-black text-lg mb-2 flex items-center justify-center gap-2">
                                                <i className="fa-solid fa-rocket"></i> 3단계. 로봇 프로젝트 완성
                                            </h2>
                                            <p className="text-sm text-gray-500">
                                                팀원들과 완성한 핵심 설계 규칙을 바탕으로 프로젝트를 실현해봅시다.
                                            </p>
                                        </div>

                                            </div>

                                            <p className="text-gray-400 text-sm mb-10 leading-relaxed relative z-10">

                                            </p>

                                            <div className="relative z-10 mb-10 max-w-lg mx-auto py-6 border-y border-[#333]">
                                                <i className="fa-solid fa-quote-left text-gray-600 text-2xl mb-4 block"></i>
                                                <p className="text-lg font-bold text-yellow-300 mb-3 tracking-wide break-keep">
                                                    "미래를 예측하는 가장 좋은 방법은,<br/> 스스로 미래를 만드는 것이다."
                                                </p>
                                                <p className="text-xs text-gray-500 font-medium">
                                                    - 컴퓨터 과학의 선구자, 앨런 케이 (Alan Kay) -
                                                </p>
                                            </div>

                                            <a href="https://boundary-x.github.io/vibe_coding_studio/" target="_blank" rel="noreferrer" className="inline-flex items-center gap-3 px-16 py-4 bg-yellow-300 hover:bg-yellow-400 text-black rounded-full font-black text-lg transition-all shadow-[0_10px_30px_rgba(253,224,71,0.3)] relative z-10">
                                                <i className="fa-solid fa-laptop-code"></i>
                                                바이브코딩 스튜디오 열기
                                            </a>
                                        </div>

                                        <button onClick={() => setStep(0)} className="text-xs font-black text-gray-400 hover:text-black transition-colors underline underline-offset-8">
                                            챌린지 프로세스 다시 확인하기
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {/* ================= PDF EXPORT TEMPLATE (HIDDEN) ================= */}
                        <div id="pdf-template" ref={pdfSourceRef}>
                            <div style={{textAlign: 'center', marginBottom: '30px', borderBottom: '2px solid #000', paddingBottom: '20px'}}>

                                <p style={{fontSize: '11px', color: '#666', marginTop: '5px'}}>AI 지능과 로봇 하드웨어의 융합을 통한 문제 해결 설계도</p>
                            </div>

                            <div style={{display: 'flex', gap: '15px', marginBottom: '30px'}}>
                                <div style={{flex: 1, border: '1px solid #ddd', padding: '15px', borderRadius: '10px', textAlign: 'center'}}>
                                    <div style={{fontSize: '10px', color: '#888', fontWeight: 'bold'}}>1. 지능 (입력)</div>
                                    <div style={{fontSize: '16px', fontWeight: 'bold', marginTop: '5px'}}>{intelCard?.name}</div>
                                </div>
                                <div style={{flex: 1, border: '1px solid #ddd', padding: '15px', borderRadius: '10px', textAlign: 'center'}}>
                                    <div style={{fontSize: '10px', color: '#888', fontWeight: 'bold'}}>2. 기능 (출력)</div>
                                    <div style={{fontSize: '16px', fontWeight: 'bold', marginTop: '5px'}}>{funcCard?.name}</div>
                                </div>
                                <div style={{flex: 1, border: '1px solid #ddd', padding: '15px', borderRadius: '10px', textAlign: 'center'}}>
                                    <div style={{fontSize: '10px', color: '#888', fontWeight: 'bold'}}>3. 상황 (환경)</div>
                                    <div style={{fontSize: '16px', fontWeight: 'bold', marginTop: '5px'}}>{sitCard?.name}</div>
                                </div>
                            </div>

                            <div style={{border: '1px solid #000', padding: '20px', borderRadius: '15px', marginBottom: '30px'}}>
                                <div style={{fontSize: '12px', fontWeight: 'bold', borderBottom: '1px solid #eee', paddingBottom: '10px', marginBottom: '15px'}}>2-1. 공간 해체 (Decomposition)</div>
                                <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '20px'}}>
                                    <div>
                                        <div style={{fontSize: '10px', color: '#999'}}>사람</div>
                                        <div style={{fontSize: '14px', borderBottom: '1px solid #eee', padding: '8px 0'}}>{decompPeople || '(미기재)'}</div>
                                    </div>
                                    <div>
                                        <div style={{fontSize: '10px', color: '#999'}}>사물</div>
                                        <div style={{fontSize: '14px', borderBottom: '1px solid #eee', padding: '8px 0'}}>{decompObject || '(미기재)'}</div>
                                    </div>
                                    <div>
                                        <div style={{fontSize: '10px', color: '#999'}}>환경</div>
                                        <div style={{fontSize: '14px', borderBottom: '1px solid #eee', padding: '8px 0'}}>{decompEnv || '(미기재)'}</div>
                                    </div>
                                </div>
                            </div>

                            <div style={{border: '1px solid #000', padding: '20px', borderRadius: '15px', marginBottom: '30px', background: '#f9f9f9'}}>
                                <div style={{fontSize: '12px', fontWeight: 'bold', marginBottom: '10px'}}>2-2. 문제 정의 (Pain Point)</div>
                                <p style={{fontSize: '15px', lineHeight: '1.6', minHeight: '40px'}}>
                                    {painPoint || '정의된 문제가 없습니다.'}
                                </p>
                            </div>

                            <div style={{background: '#000', color: '#fff', padding: '40px', borderRadius: '25px', textAlign: 'center'}}>
                                <div style={{fontSize: '10px', letterSpacing: '4px', opacity: '0.6', marginBottom: '20px'}}>ROBOT DESIGN RULE</div>
                                <div style={{fontSize: '19px', fontWeight: 'bold', lineHeight: '2'}}>
                                    우리 팀은 <span style={{color: '#FDE047'}}>{intelCard?.name}</span> 지능을 활용하고,<br/>
                                    <span style={{color: '#FDE047'}}>{funcCard?.name}</span> 기능을 움직여 <br/>
                                    <span style={{color: '#FDE047'}}>{sitCard?.name}</span> 상황에서 발생하는 <br/>
                                    <span style={{textDecoration: 'underline'}}>{painPoint}</span> 문제를 해결한다.
                                </div>
                            </div>

                            <div style={{marginTop: '50px', borderTop: '1px solid #eee', paddingTop: '20px', textAlign: 'center', fontSize: '10px', color: '#aaa'}}>
                                본 기획서는 Boundary X 로봇 리믹스 챌린지를 통해 생성되었습니다. | vibe.boundaryx.io
                            </div>
                        </div>

                    </main>

                    <footer className="bg-black text-white px-6 py-12 border-t border-[#222] z-50">
                        <div className="max-w-5xl mx-auto flex flex-col md:flex-row justify-between gap-10">
                            <div className="flex-1">
                                <h2 className="text-xl font-bold mb-4">바운더리엑스</h2>
                                <p className="text-gray-400 text-sm mb-6 leading-relaxed italic">"우리는 산업과 교육의 경계를 허물고, 미래 기술을 교실의 책상 위로 옮기는 사람들입니다"</p>
                                <address className="not-italic text-gray-500 text-[11px] leading-6">
                                    <p>경기도 화성시 동탄첨단산업1로 57 동탄2인큐베이팅센터, 7층 706호</p>
                                    <p className="mt-1">© 2026 Boundary X Co. All rights reserved.</p>
                                </address>
                            </div>
                            <div className="flex flex-row gap-12">
                                <div className="min-w-[120px]">
                                    <h4 className="text-sm font-bold mb-4 text-white">제품 소개</h4>
                                    <ul className="space-y-4">
                                        <li><a href="https://boundaryx.io/shop/?idx=25" target="_blank" className="text-gray-400 hover:text-white text-xs font-bold block">AI 비트런</a><span className="link-desc">이족보행로봇</span></li>
                                        <li><a href="https://boundaryx.io/shop/?idx=26" target="_blank" className="text-gray-400 hover:text-white text-xs font-bold block">AI 포니봇</a><span className="link-desc">모빌리티로봇</span></li>
                                    </ul>
                                </div>
                                <div className="min-w-[120px]">
                                    <h4 className="text-sm font-bold mb-4 text-white">고객 지원</h4>
                                    <ul className="space-y-4">
                                        <li><a href="https://boundaryx.io/contact" target="_blank" className="text-gray-400 hover:text-white text-xs font-bold block">문의처</a><span className="link-desc">제품 | 제휴 | 연수 문의</span></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
